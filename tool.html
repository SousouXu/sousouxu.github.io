<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子工具集</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 核心：设置body为flex布局实现粘性页脚 */
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            min-height: 100vh; /* 让body至少占满视口高度 */
            display: flex;
            flex-direction: column; /* 垂直排列子元素 */
        }

        /* 顶部导航栏 */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        /* 签名样式（放在logo后方） */
        .logo-signature {
            font-size: 1rem;
            font-weight: normal;
            font-style: italic;
            color: #ddd;
            opacity: 0.8;
        }

        /* 搜索框样式 */
        .search-box {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 300px;
            max-width: 100%;
        }

        #search-input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }

        #search-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #search-btn:hover {
            background-color: #2980b9;
        }

        /* 搜索结果提示 */
        .search-result {
            margin-top: 0.5rem;
            color: #f1c40f;
            font-size: 0.9rem;
            width: 100%;
            text-align: right;
        }

        /* 主体内容区：占满剩余空间，推动页脚到底部 */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            flex: 1; /* 核心属性：占据body剩余的所有空间 */
        }

        .tools-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #2c3e50;
            border: none;
            border-bottom: 2px solid #3498db;
            padding-bottom: 0.5rem;
            text-align: left; /* 核心修改：标题靠左对齐 */
            width: 100%; /* 确保标题占满容器宽度，对齐更规整 */
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* 工具卡片样式 */
        .tool-card {
            background-color: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-5px);
        }

        .tool-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 0.8rem;
        }

        .tool-desc {
            color: #666;
            margin-bottom: 1rem;
        }

        .tool-link {
            display: inline-block;
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .tool-link:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        /* 高亮样式（匹配的搜索关键词） */
        .highlight {
            background-color: #f1c40f;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* 页脚：始终贴在底部 */
        .footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: auto; /* 核心属性：自动顶到底部 */
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .search-box {
                width: 100%;
            }

            .logo {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="nav-container">
            <div class="logo">
                电子工具集
                <span class="logo-signature">—— Angus</span>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索工具名称/描述...">
                <button id="search-btn">搜索</button>
            </div>
            <div class="search-result" id="search-result"></div>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="container">
        <h2 class="tools-title">常用电子工具</h2>
        <div class="tools-grid" id="tools-container">
            <!-- 仅保留电源IC电压计算工具卡片 -->
            <div class="tool-card">
                <div class="tool-name">电源IC电压计算工具</div>
                <div class="tool-desc">快速计算电源IC的输出电压，支持多种常见电源芯片型号的电压配置与参数换算。</div>
                <a href="https://xusousou.github.io/tool/电源IC电压计算工具.html" class="tool-link">立即使用</a>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>电子工具集 © 2026 版权所有</p>
    </footer>

    <script>
        // 获取DOM元素
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const toolsContainer = document.getElementById('tools-container');
        const searchResult = document.getElementById('search-result');

        // 初始化：保存原始的工具卡片HTML（用于重置高亮）
        const originalToolsHtml = toolsContainer.innerHTML;

        // 搜索功能核心函数
        function searchContent() {
            // 1. 获取并处理搜索关键词
            const keyword = searchInput.value.trim().toLowerCase();
            // 重置搜索结果提示和高亮
            searchResult.textContent = '';
            toolsContainer.innerHTML = originalToolsHtml;

            // 如果关键词为空，直接返回
            if (!keyword) return;

            // 2. 获取所有工具卡片
            const toolCards = document.querySelectorAll('.tool-card');
            let matchCount = 0; // 匹配的数量
            let firstMatchCard = null; // 第一个匹配的卡片

            // 3. 遍历每个卡片，匹配关键词
            toolCards.forEach(card => {
                // 获取卡片内的文本内容（名称+描述）
                const cardText = card.textContent.toLowerCase();
                
                if (cardText.includes(keyword)) {
                    matchCount++;
                    // 记录第一个匹配的卡片（用于定位）
                    if (!firstMatchCard) firstMatchCard = card;

                    // 4. 高亮匹配的关键词（替换文本，保留原结构）
                    // 处理工具名称
                    const toolName = card.querySelector('.tool-name');
                    toolName.innerHTML = highlightKeyword(toolName.textContent, keyword);
                    // 处理工具描述
                    const toolDesc = card.querySelector('.tool-desc');
                    toolDesc.innerHTML = highlightKeyword(toolDesc.textContent, keyword);
                }
            });

            // 5. 显示搜索结果提示
            if (matchCount === 0) {
                searchResult.textContent = `未找到包含「${keyword}」的内容`;
            } else {
                searchResult.textContent = `找到 ${matchCount} 个匹配结果`;
                // 自动滚动到第一个匹配的卡片
                firstMatchCard.scrollIntoView({
                    behavior: 'smooth', // 平滑滚动
                    block: 'center' // 居中显示
                });
                // 给第一个匹配卡片添加短暂的视觉提示
                firstMatchCard.style.boxShadow = '0 0 15px rgba(52, 152, 219, 0.5)';
                setTimeout(() => {
                    firstMatchCard.style.boxShadow = '';
                }, 2000);
            }
        }

        // 辅助函数：高亮关键词
        function highlightKeyword(text, keyword) {
            // 转义特殊字符，避免正则报错
            const escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            // 全局匹配，不区分大小写
            const regex = new RegExp(escapedKeyword, 'gi');
            // 替换为带高亮样式的标签
            return text.replace(regex, match => `<span class="highlight">${match}</span>`);
        }

        // 绑定事件：点击搜索按钮触发搜索
        searchBtn.addEventListener('click', searchContent);
        // 绑定事件：按回车键触发搜索
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchContent();
        });
    </script>
</body>
</html>
